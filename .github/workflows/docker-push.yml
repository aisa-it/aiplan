name: Build and Push app docker image to github registry

on:
  push:
    tags:
      - "v*"
  # Manual run for internal test builds: publishes a pre-release image and moves
  # the "dev" tag, never "latest", and creates no git tag.
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: "recursive"
          # full history: version of a manual build is derived from repo tags
          fetch-depth: 0

      #- name: Fetch front submodules
      #  run: |
      #    git config submodule.aiplan-api-ts.url https://x-access-token:${{ secrets.GIT_PAT }}@github.com/aisa-it/aiplan-api-ts.git
      #    cd aiplan-front
      #    git submodule update --recursive --init

      # Tag push is a release: keep the tag as version and move "latest".
      # Manual run is a test build: derive a pre-release version from the highest
      # repo tag and move "dev". Version must be valid semver, the front build
      # feeds it to "yarn version --new-version".
      - name: Resolve version and channel
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            version="${{ github.ref_name }}"
            moving="latest"
          else
            base=$(git tag --sort=-v:refname | head -n 1)
            base=${base:-v0.0.0}
            base=${base#v}
            major=$(echo "$base" | cut -d. -f1)
            minor=$(echo "$base" | cut -d. -f2)
            # 10# avoids octal parsing, g prefix keeps the sha non-numeric
            version="v${major}.$((10#$minor + 1)).0-dev.${{ github.run_number }}.g$(git rev-parse --short=7 HEAD)"
            moving="dev"
          fi
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "moving_tag=$moving" >> $GITHUB_OUTPUT
          echo "Building $version, moving tag: $moving"

      - name: Build and Push
        uses: dagger/dagger-for-github@v8.4.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          call: build-app --source=. --version=${{ steps.meta.outputs.version }} --registryUser=${{ github.actor }} --registrySecret=GITHUB_TOKEN --imageName=aisa-it/aiplan --movingTag=${{ steps.meta.outputs.moving_tag }}
          version: "0.20.8"

  generate-api:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: "false"
          token: ${{ secrets.GIT_PAT }}
          fetch-depth: 1

      - name: Config Git
        run: |
          git config submodule.aiplan-api-ts.url https://x-access-token:${{ secrets.GIT_PAT }}@github.com/aisa-it/aiplan-api-ts.git
          git submodule update --init aiplan-api-ts
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Prepare
        run: |
          npm i -g swagger-typescript-api

      - name: Generate API
        run: |
          cd aiplan-api-ts
          git checkout main
          npx swagger-typescript-api generate --axios --modular --module-name-first-tag -p ../aiplan.go/internal/aiplan/docs/swagger.json -o ./src/ -n aiplan-api.ts
          git add .
          if git diff --cached --quiet; then
            echo "No API changes detected, skipping commit"
            exit 0
          fi
          git commit -m "new generated API version"
          yarn version --minor
          git push origin main
          git push --tags

      - name: Get latest submodule commit hash
        id: submodule_commit
        run: |
          cd aiplan-api-ts
          echo "commit_hash=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      #- name: Update main repository with new submodule reference
      #  run: |
      #    git add aiplan-api-ts
      #    git commit -m "Update api ts submodule to ${{ steps.submodule_commit.outputs.commit_hash }}"
      #    git push origin HEAD:main
